# Streamlit secrets template for LIVE data on Streamlit Community Cloud.
# In the app: "Manage app" -> "Settings" -> "Secrets" and paste the filled-in
# version of this. Locally: copy to .streamlit/secrets.toml (gitignored).
# Same names as .env.example. Omit any platform you don't connect -> it stays
# synthetic. Then pick "Live (from secrets)" in the app sidebar.

# --- YouTube ---
YT_CHANNEL_ID = ""
YT_CLIENT_ID = ""
YT_CLIENT_SECRET = ""
YT_REFRESH_TOKEN = ""
# YT_API_KEY = ""          # public Data API fallback

# --- Instagram ---
IG_USER_ID = ""
IG_ACCESS_TOKEN = ""

# --- TikTok ---
TT_ACCESS_TOKEN = ""
